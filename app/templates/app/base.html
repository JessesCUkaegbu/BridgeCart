{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app/main.css' %}">
    <title>{% block title %}BridgeCart - From China, To Your Door{% endblock %}</title>
</head>

<body class="bridgecart-body">
    <header class="site-header shadow-sm">
        <a class="site-logo" href="#page-home" data-page-target="home">
            <span class="site-logo-icon"><i class="bi bi-truck"></i></span>
            <span class="site-logo-text">Bridge<span>Cart</span></span>
        </a>
        <div class="site-nav-links">
            <button class="site-nav-link active" type="button" data-page-target="home">Home</button>
            <button class="site-nav-link" type="button" data-page-target="shop">Shop</button>
            <button class="site-nav-cta" type="button" data-page-target="home" data-scroll-target="request-form">
                Request a product
            </button>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-logo">Bridge<span>Cart</span></div>
        <p>From China, to your door &middot; Liberia</p>
        <div class="footer-links">
            <button type="button" data-page-target="home">Home</button>
            <button type="button" data-page-target="shop">Shop</button>
            <button type="button" data-whatsapp-link="https://wa.me/231779005985">WhatsApp</button>
        </div>
        <small>&copy; 2026 BridgeCart. All rights reserved.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="{% static 'app/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
